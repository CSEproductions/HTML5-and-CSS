<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wireframe-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
        }

        .wireframe-container img {
            width: 100%;
            height: auto;
            display: block;
            border: 2px solid #ccc;
            border-radius: 6px;
        }

        .hotspot {
            position: absolute;
            border: 2px dashed rgba(255, 0, 0, 0.5);
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .hotspot:hover {
            background-color: rgba(255, 0, 0, 0.2);
        }
    </style>
</head>
<body>

<div class="assets">
    <img src="Our story.png" alt="Wireframe Layout">

    <div class="hotspot" style="top: 20%; left: 10%; width: 20%; height: 10%;" 
         onclick="alert('Header clicked!')"></div>

    <div class="hotspot" style="top: 50%; left: 30%; width: 40%; height: 15%;" 
         onclick="alert('Main content clicked!')"></div>
</div>

</body>
</html>
